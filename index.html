<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 { font-size: 1.6rem; }

    .balance-card {
      background: white;
      margin: 20px auto;
      max-width: 480px;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }

    .balance-card .label { font-size: 0.85rem; color: #888; margin-bottom: 6px; }

    .balance-amount {
      font-size: 2rem;
      font-weight: 700;
      color: #2563eb;
    }

    .summary {
      display: flex;
      justify-content: space-around;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .summary-item { text-align: center; }
    .summary-item .s-label { font-size: 0.78rem; color: #888; }
    .summary-item .s-amount { font-size: 1.1rem; font-weight: 600; margin-top: 2px; }
    .income .s-amount { color: #16a34a; }
    .expense .s-amount { color: #dc2626; }

    .form-card {
      background: white;
      margin: 0 auto 20px;
      max-width: 480px;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form-card h2 { font-size: 1rem; margin-bottom: 14px; color: #555; }

    .type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .type-toggle button {
      flex: 1;
      padding: 8px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.15s;
    }

    .type-toggle button.active-income {
      border-color: #16a34a;
      background: #f0fdf4;
      color: #16a34a;
    }

    .type-toggle button.active-expense {
      border-color: #dc2626;
      background: #fef2f2;
      color: #dc2626;
    }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus { border-color: #2563eb; }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover { background: #1d4ed8; }
    .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .list-card {
      background: white;
      margin: 0 auto 40px;
      max-width: 480px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
    }

    .list-header h2 { font-size: 1rem; color: #555; }

    .filter-select {
      width: auto;
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    .transaction-list { list-style: none; }

    .transaction-item {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      gap: 12px;
      transition: background 0.1s;
    }

    .transaction-item:hover { background: #fafafa; }

    .tx-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .tx-icon.income { background: #f0fdf4; }
    .tx-icon.expense { background: #fef2f2; }

    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 0.75rem; color: #aaa; margin-top: 2px; }

    .tx-amount { font-weight: 700; font-size: 0.95rem; flex-shrink: 0; }
    .tx-amount.income { color: #16a34a; }
    .tx-amount.expense { color: #dc2626; }

    .tx-delete {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .tx-delete:hover { color: #dc2626; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
      font-size: 0.9rem;
    }

    .loading-state {
      text-align: center;
      padding: 40px 20px;
      color: #93c5fd;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>💰 가계부</h1>
</header>

<div class="balance-card">
  <div class="label">현재 잔액</div>
  <div class="balance-amount" id="balance">₩0</div>
  <div class="summary">
    <div class="summary-item income">
      <div class="s-label">수입</div>
      <div class="s-amount" id="total-income">₩0</div>
    </div>
    <div class="summary-item expense">
      <div class="s-label">지출</div>
      <div class="s-amount" id="total-expense">₩0</div>
    </div>
  </div>
</div>

<div class="form-card">
  <h2>내역 추가</h2>
  <div class="type-toggle">
    <button id="btn-income" class="active-income" onclick="setType('income')">+ 수입</button>
    <button id="btn-expense" onclick="setType('expense')">- 지출</button>
  </div>
  <div class="form-row">
    <input type="date" id="input-date">
    <select id="input-category" style="width:140px; flex-shrink:0;">
      <option value="">카테고리</option>
    </select>
  </div>
  <div class="form-row">
    <input type="text" id="input-desc" placeholder="내용">
    <input type="number" id="input-amount" placeholder="금액" min="0" style="width:140px; flex-shrink:0;">
  </div>
  <button class="submit-btn" id="submit-btn" onclick="addTransaction()">추가</button>
</div>

<div class="list-card">
  <div class="list-header">
    <h2>거래 내역</h2>
    <select class="filter-select" id="filter-month" onchange="render()">
      <option value="all">전체</option>
    </select>
  </div>
  <ul class="transaction-list" id="tx-list">
    <div class="loading-state">불러오는 중...</div>
  </ul>
</div>

<script>
  // 아래 값은 Supabase 프로젝트의 Settings > API 에서 확인 후 직접 입력하세요
  // 보안을 위해 실제 키는 코드에 넣지 말고 별도 관리하세요
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const CATEGORIES = {
    income: ['급여', '부업', '용돈', '투자', '기타 수입'],
    expense: ['식비', '교통', '쇼핑', '문화', '의료', '주거', '통신', '기타 지출']
  };

  const ICONS = { income: '💵', expense: '💸' };

  let currentType = 'income';
  let transactions = [];

  async function init() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('input-date').value = today;
    updateCategories();
    await loadTransactions();
  }

  async function loadTransactions() {
    const { data, error } = await db
      .from('transactions')
      .select('*')
      .order('date', { ascending: false })
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      alert('데이터를 불러오는 데 실패했습니다.');
      return;
    }

    transactions = data;
    updateMonthFilter();
    render();
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btn-income').className = type === 'income' ? 'active-income' : '';
    document.getElementById('btn-expense').className = type === 'expense' ? 'active-expense' : '';
    updateCategories();
  }

  function updateCategories() {
    const sel = document.getElementById('input-category');
    sel.innerHTML = '<option value="">카테고리</option>';
    CATEGORIES[currentType].forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  }

  async function addTransaction() {
    const date = document.getElementById('input-date').value;
    const category = document.getElementById('input-category').value;
    const description = document.getElementById('input-desc').value.trim();
    const amount = parseInt(document.getElementById('input-amount').value);

    if (!date || !description || !amount || amount <= 0) {
      alert('날짜, 내용, 금액을 모두 입력해주세요.');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    const { data, error } = await db
      .from('transactions')
      .insert({
        type: currentType,
        date,
        category: category || (currentType === 'income' ? '기타 수입' : '기타 지출'),
        description,
        amount
      })
      .select()
      .single();

    btn.disabled = false;
    btn.textContent = '추가';

    if (error) {
      console.error(error);
      alert('저장에 실패했습니다.');
      return;
    }

    transactions.unshift(data);
    document.getElementById('input-desc').value = '';
    document.getElementById('input-amount').value = '';
    updateMonthFilter();
    render();
  }

  async function deleteTransaction(id) {
    const { error } = await db.from('transactions').delete().eq('id', id);
    if (error) {
      console.error(error);
      alert('삭제에 실패했습니다.');
      return;
    }
    transactions = transactions.filter(t => t.id !== id);
    updateMonthFilter();
    render();
  }

  function updateMonthFilter() {
    const sel = document.getElementById('filter-month');
    const current = sel.value;
    const months = [...new Set(transactions.map(t => t.date.slice(0, 7)))].sort().reverse();
    sel.innerHTML = '<option value="all">전체</option>';
    months.forEach(m => {
      const o = document.createElement('option');
      o.value = m;
      o.textContent = m.replace('-', '년 ') + '월';
      o.selected = m === current;
      sel.appendChild(o);
    });
  }

  function fmt(n) {
    return '₩' + n.toLocaleString();
  }

  function render() {
    const filter = document.getElementById('filter-month').value;
    const filtered = filter === 'all' ? transactions : transactions.filter(t => t.date.startsWith(filter));

    const income = filtered.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = filtered.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('balance').textContent = fmt(balance);
    document.getElementById('total-income').textContent = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);

    const list = document.getElementById('tx-list');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">거래 내역이 없습니다.</div>';
      return;
    }

    list.innerHTML = filtered.map(t => `
      <li class="transaction-item">
        <div class="tx-icon ${t.type}">${ICONS[t.type]}</div>
        <div class="tx-info">
          <div class="tx-desc">${t.description}</div>
          <div class="tx-meta">${t.date} · ${t.category}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
        <button class="tx-delete" onclick="deleteTransaction(${t.id})">✕</button>
      </li>
    `).join('');
  }

  init();
</script>
</body>
</html>
